<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos — Comagro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

/* Overlay wrapper to ensure the app takes full screen inside the CMS content area */
.comagro-app-root {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 2147483647 !important;
  box-sizing: border-box !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  font-size: 16px !important;
}

/* =============================================
   COMAGRO EVENTOS — Design System Global CSS
   ============================================= */

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');

/* ---- Variables ---- */
:root {
  --primary:        #0f172a;
  --primary-hover:  #1e293b;
  --primary-light:  #f1f5f9;
  --primary-dark:   #020617;
  --surface:        #ffffff;
  --surface-2:      #f8fafc;
  --surface-3:      #f1f5f9;
  --border:         #e2e8f0;
  --border-light:   #f1f5f9;
  --text-1:         #0f172a;
  --text-2:         #475569;
  --text-3:         #94a3b8;
  --success:        #10b981;
  --success-bg:     #ecfdf5;
  --warning:        #f59e0b;
  --warning-bg:     #fffbeb;
  --danger:         #ef4444;
  --danger-bg:      #fef2f2;
  --info:           #3b82f6;
  --info-bg:        #eff6ff;
  --radius-sm:      8px;
  --radius:         12px;
  --radius-lg:      20px;
  --radius-xl:      28px;
  --shadow-sm:      0 1px 2px rgba(0,0,0,.04);
  --shadow:         0 8px 30px rgba(0,0,0,.04);
  --shadow-lg:      0 20px 40px rgba(0,0,0,.08);
  --sidebar-w:      260px;
  --topbar-h:       64px;
  --transition:     .2s ease-out;
}

/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px !important; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--surface-2);
  color: var(--text-1);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* ---- Typography ---- */
h1, h2, h3, h4, h5 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  line-height: 1.25;
  color: var(--text-1);
  letter-spacing: -0.02em;
}
h1 { font-size: clamp(1.8rem, 4vw, 2.4rem); }
h2 { font-size: clamp(1.4rem, 3vw, 1.8rem); }
h3 { font-size: 1.1rem; }
h4 { font-size: 1rem; font-weight: 600; }
p  { color: var(--text-2); line-height: 1.6; }

/* ---- Layout ---- */
.app-layout {
  display: flex;
  min-height: 100vh;
}
.app-main {
  flex: 1;
  margin-left: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.page-content {
  flex: 1;
  padding: 36px 40px;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

/* ---- Sidebar ---- */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--primary-dark);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 20px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-logo img {
  height: 36px;
  width: auto;
  filter: brightness(0) invert(1);
}
.sidebar-logo-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: .78rem;
  color: rgba(255,255,255,.85);
  line-height: 1.3;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.sidebar-section {
  padding: 16px 12px 4px;
}
.sidebar-section-label {
  font-size: .68rem;
  font-weight: 600;
  color: rgba(255,255,255,.35);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 4px;
}
.sidebar-nav { list-style: none; }
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,.70);
  font-size: .875rem;
  font-weight: 500;
  transition: background var(--transition), color var(--transition);
}
.sidebar-nav a:hover,
.sidebar-nav a.active {
  background: rgba(255,255,255,.10);
  color: #fff;
}
.sidebar-nav a.active {
  background: rgba(255,255,255,.15);
  color: #fff;
}
.sidebar-nav .nav-icon {
  width: 18px;
  text-align: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.sidebar-footer {
  margin-top: auto;
  padding: 14px 12px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary-hover);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .8rem;
  flex-shrink: 0;
}
.sidebar-user-info {
  flex: 1;
  min-width: 0;
}
.sidebar-user-name {
  font-size: .82rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-role {
  font-size: .7rem;
  color: rgba(255,255,255,.45);
  text-transform: capitalize;
}

/* ---- Topbar ---- */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-1);
  flex: 1;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border: none;
  border-radius: var(--radius-lg);
  padding: 28px;
  box-shadow: var(--shadow);
}
.card-sm { padding: 20px 24px; }
.card-hover {
  transition: box-shadow var(--transition), transform var(--transition);
  cursor: pointer;
}
.card-hover:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}

/* ---- Stat Cards ---- */
.stat-card {
  background: var(--surface);
  border: none;
  border-radius: var(--radius-lg);
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  box-shadow: var(--shadow);
  transition: box-shadow var(--transition);
}
.stat-card:hover { box-shadow: var(--shadow-lg); }
.stat-icon {
  width: 52px;
  height: 52px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.stat-icon.blue   { background: var(--primary-light); color: var(--primary); }
.stat-icon.green  { background: var(--success-bg); color: var(--success); }
.stat-icon.yellow { background: var(--warning-bg); color: var(--warning); }
.stat-icon.red    { background: var(--danger-bg); color: var(--danger); }
.stat-body { flex: 1; min-width: 0; }
.stat-value {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 1.8rem;
  color: var(--text-1);
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat-label {
  font-size: .8rem;
  color: var(--text-2);
  margin-top: 6px;
  font-weight: 500;
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 42px;
  padding: 0 20px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: .9rem;
  transition: all var(--transition);
  white-space: nowrap;
  text-decoration: none;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 10px rgba(15,23,42,.15);
}
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 6px 16px rgba(15,23,42,.25); }
.btn-secondary {
  background: var(--surface);
  color: var(--text-1);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover { background: var(--surface-2); border-color: #cbd5e1; }
.btn-danger {
  background: var(--danger);
  color: #fff;
  box-shadow: 0 4px 10px rgba(239,68,68,.15);
}
.btn-danger:hover { background: #b91c1c; }
.btn-success {
  background: var(--success);
  color: #fff;
  box-shadow: 0 4px 10px rgba(16,185,129,.15);
}
.btn-success:hover { background: #059669; }
.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 0 12px;
}
.btn-ghost:hover { background: var(--surface-3); color: var(--text-1); }
.btn-sm { height: 34px; padding: 0 14px; font-size: .85rem; }
.btn-lg { height: 50px; padding: 0 32px; font-size: 1.05rem; }
.btn-full { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

/* ---- Form Elements ---- */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: .82rem;
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 6px;
}
.form-label .req { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-1);
  font-size: .9rem;
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}
.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31,47,107,.10);
}
.form-control::placeholder { color: var(--text-3); }
textarea.form-control {
  height: auto;
  padding: 10px 12px;
  resize: vertical;
  min-height: 90px;
}
select.form-control { cursor: pointer; }
.form-hint {
  font-size: .75rem;
  color: var(--text-3);
  margin-top: 4px;
}
.form-error {
  font-size: .75rem;
  color: var(--danger);
  margin-top: 4px;
}
.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}

/* ---- Badges ---- */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .02em;
  text-transform: capitalize;
}
.badge-blue   { background: var(--primary-light); color: var(--primary); }
.badge-green  { background: var(--success-bg); color: var(--success); }
.badge-yellow { background: var(--warning-bg); color: var(--warning); }
.badge-red    { background: var(--danger-bg); color: var(--danger); }
.badge-gray   { background: var(--surface-3); color: var(--text-2); }

/* ---- Tables ---- */
.table-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--surface);
}
table {
  width: 100%;
  border-collapse: collapse;
}
thead th {
  background: var(--surface-2);
  padding: 11px 16px;
  text-align: left;
  font-size: .76rem;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: .04em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 12px 16px;
  font-size: .875rem;
  color: var(--text-1);
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface-2); }

/* ---- Search / Filter Bar ---- */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-input-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-input-wrap .search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: .9rem;
  pointer-events: none;
}
.search-input {
  width: 100%;
  height: 38px;
  padding: 0 12px 0 34px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: .875rem;
  color: var(--text-1);
  outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--primary); }

/* ---- Page Header ---- */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.page-header-left h1 { font-size: 1.4rem; }
.page-header-left p  { font-size: .85rem; margin-top: 2px; }

/* ---- Empty State ---- */
.empty-state {
  text-align: center;
  padding: 56px 24px;
}
.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: .35;
}
.empty-state h3 { color: var(--text-2); font-weight: 600; }
.empty-state p  { font-size: .85rem; margin-top: 6px; }

/* ---- Grids ---- */
.grid-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.grid-events {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

/* ---- Event Card ---- */
.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: box-shadow var(--transition), transform var(--transition);
  cursor: pointer;
}
.event-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.event-card-banner {
  height: 130px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
  position: relative;
  overflow: hidden;
}
.event-card-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.event-card-type {
  position: absolute;
  top: 10px;
  right: 10px;
}
.event-card-body { padding: 16px 18px 18px; }
.event-card-date {
  font-size: .75rem;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.event-card-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-1);
  margin-bottom: 6px;
  line-height: 1.3;
}
.event-card-location {
  font-size: .8rem;
  color: var(--text-2);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.event-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border-light);
  padding-top: 12px;
}
.event-card-stat {
  font-size: .75rem;
  color: var(--text-2);
  font-weight: 500;
}
.event-card-stat strong {
  display: block;
  font-size: 1.05rem;
  color: var(--text-1);
  font-weight: 700;
}

/* ---- Toast Notifications ---- */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: var(--radius);
  background: var(--text-1);
  color: #fff;
  font-size: .875rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  min-width: 260px;
  transform: translateX(110%);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
}
.toast.toast-show { transform: translateX(0); }
.toast-success { background: #15803d; }
.toast-error   { background: var(--danger); }
.toast-info    { background: var(--primary); }
.toast-icon    { font-weight: 800; font-size: 1rem; flex-shrink: 0; }

/* ---- Modal ---- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26,31,54,.45);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity .2s, visibility .2s;
}
.modal-backdrop.open { opacity: 1; visibility: visible; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px) scale(.97);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.modal-backdrop.open .modal { transform: translateY(0) scale(1); }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 1.05rem; }
.modal-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--surface-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  color: var(--text-2);
  transition: background var(--transition);
}
.modal-close:hover { background: var(--border); }
.modal-body   { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ---- Progress Bar ---- */
.progress {
  height: 8px;
  background: var(--surface-3);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 99px;
  background: var(--primary);
  transition: width .6s ease;
}
.progress-bar.green  { background: var(--success); }
.progress-bar.yellow { background: var(--warning); }
.progress-bar.red    { background: var(--danger); }

/* ---- Loader ---- */
.loader {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.loader-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 300px;
}
.loader-page .loader {
  width: 32px;
  height: 32px;
  border-color: var(--border);
  border-top-color: var(--primary);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Breadcrumbs ---- */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .78rem;
  color: var(--text-3);
  margin-bottom: 16px;
}
.breadcrumb a { color: var(--text-2); }
.breadcrumb a:hover { color: var(--primary); }
.breadcrumb .sep { color: var(--text-3); }

/* ---- Dividers ---- */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ---- Alert Inline ---- */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: .875rem;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.alert-success { background: var(--success-bg); color: var(--success); }
.alert-warning { background: var(--warning-bg); color: var(--warning); }
.alert-danger  { background: var(--danger-bg);  color: var(--danger); }
.alert-info    { background: var(--info-bg);    color: var(--info); }

/* ---- Mobile Sidebar Toggle ---- */
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  color: var(--text-1);
  font-size: 1.2rem;
}

/* ========================
   RESPONSIVE
   ======================== */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }
  .app-main {
    margin-left: 0;
  }
  .sidebar-toggle { display: flex; }
  .page-content { padding: 20px 16px; }
  .topbar { padding: 0 16px; }
  .grid-stats { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 420px) {
  .grid-stats { grid-template-columns: 1fr; }

}

      <div class="sidebar-section-label">Gestión</div>

        <i data-lucide="log-out" size="16" stroke-width="2.5"></i> Cerrar sesión
      </button>

  <div class="app-main">

      <button class="sidebar-toggle" id="sidebar-toggle">☰</button>

      <div class="topbar-actions">
        <a href="/eventos-crear" class="btn btn-primary btn-sm">+ Nuevo Evento</a>

    <main class="page-content">
      <!-- Filter bar -->
      <div style="margin-bottom:22px;">
        <div class="filter-bar">
          <div class="search-input-wrap">

            <input type="text" id="search-input" class="search-input" placeholder="Buscar evento...">
          </div>
          <select id="filter-status" class="form-control" style="width:auto;height:38px;">
            <option value="">Todos los estados</option>
            <option value="borrador">Borrador</option>
            <option value="activo">Activo</option>
            <option value="finalizado">Finalizado</option>
          </select>
          <select id="filter-type" class="form-control" style="width:auto;height:38px;">
            <option value="">Todos los tipos</option>
            <option value="capacitacion">Capacitación</option>
            <option value="evento">Evento</option>

<script>
const SUPABASE_URL = 'https://itylpvuzflqlmmqvdhbz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWxwdnV6ZmxxbG1tcXZkaGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjYzMTgsImV4cCI6MjA5MTg0MjMxOH0.yuZ5sWX-Isxd04ySP_ZgDLit1fQDsxoeb25GmU_C_5I';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { autoRefreshToken:true, persistSession:true } });

function sanitize(s){return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'})[c]);}
function formatDate(d){if(!d)return '—';return new Date(d+'T00:00:00').toLocaleDateString('es-PY',{day:'2-digit',month:'short',year:'numeric'});}
function statusLabel(s){return {'borrador':'Borrador','activo':'Activo','finalizado':'Finalizado','capacitacion':'Capacitación','evento':'Evento','lanzamiento':'Lanzamiento','feria':'Feria','otro':'Otro'}[s]||s;}
function statusBadge(s){return {'borrador':'badge-gray','activo':'badge-blue','finalizado':'badge-green'}[s]||'badge-gray';}

let allEvents=[], regCounts={};

async function authGuard(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.replace('/eventos-login');return null;}
  const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  return {session,profile};
}
function renderUser(p){
  if(!p)return;
  const name=p.full_name||p.email||'Usuario';
  document.getElementById('user-name').textContent=name;
  document.getElementById('user-role').textContent=p.role||'staff';
  document.getElementById('user-avatar').textContent=name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

function buildEventCard(e){
  const count=regCounts[e.id]||0;
  const pct=e.max_capacity>0?Math.round(count/e.max_capacity*100):0;
  const bannerStyle=e.banner_url?`background:url(${sanitize(e.banner_url)}) center/cover`:'background:linear-gradient(135deg,#1f2f6b 0%,#2d4299 100%)';
  return `
    <div class="event-card" onclick="location.href='/eventos-admin?slug=${encodeURIComponent(e.slug)}'">
      <div class="event-card-banner" style="${bannerStyle};">
        <div class="event-card-type"><span class="badge badge-blue">${sanitize(statusLabel(e.type))}</span></div>
      </div>
      <div class="event-card-body">
        <div class="event-card-date"><i data-lucide="calendar" size="18" stroke-width="2.5"></i> ${formatDate(e.date)}</div>
        <div class="event-card-name">${sanitize(e.name)}</div>
        <div class="event-card-location"><i data-lucide="map-pin" size="16" stroke-width="2"></i> ${sanitize(e.location||'Sin ubicación definida')}</div>
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-2);margin-bottom:5px;">
            <span>${count} registrados</span><span>${pct}% cupo</span>
          </div>
          <div class="progress"><div class="progress-bar ${pct>80?'red':pct>50?'yellow':''}" style="width:${Math.min(pct,100)}%;"></div></div>
        </div>
        <div class="event-card-footer">
          <span class="badge ${statusBadge(e.status)}">${sanitize(statusLabel(e.status))}</span>
          <span class="btn btn-secondary btn-sm">Gestionar →</span>
        </div>
      </div>
    </div>`;
}

function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const st=document.getElementById('filter-status').value;
  const ty=document.getElementById('filter-type').value;
  const filtered=allEvents.filter(e=>{
    const matchQ=!q||e.name.toLowerCase().includes(q)||(e.location||'').toLowerCase().includes(q);
    const matchSt=!st||e.status===st;
    const matchTy=!ty||e.type===ty;
    return matchQ&&matchSt&&matchTy;
  });
  const grid=document.getElementById('events-grid');
  const empty=document.getElementById('empty-state-events');
  if(filtered.length===0){grid.style.display='none';empty.style.display='block';}
  else{grid.style.display='grid';empty.style.display='none';grid.innerHTML=filtered.map(buildEventCard).join('');}
}

async function loadEvents(){
  const [evRes,regRes]=await Promise.all([
    sb.from('events').select('*').order('date',{ascending:false}),
    sb.from('registrations').select('id,event_id')
  ]);
  allEvents=evRes.data||[];
  (regRes.data||[]).forEach(r=>{regCounts[r.event_id]=(regCounts[r.event_id]||0)+1;});
  document.getElementById('events-loader').style.display='none';
  applyFilters();
}

document.getElementById('search-input').addEventListener('input',applyFilters);
document.getElementById('filter-status').addEventListener('change',applyFilters);
document.getElementById('filter-type').addEventListener('change',applyFilters);
document.getElementById('sidebar-toggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('btn-logout').addEventListener('click',async()=>{await sb.auth.signOut();window.location.replace('/eventos-login');});

(async()=>{
  const auth=await authGuard();
  if(!auth)return;
  renderUser(auth.profile);
  await loadEvents();
})();
</script>
