<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in — Comagro Eventos</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

/* Overlay wrapper to ensure the app takes full screen inside the CMS content area */
.comagro-app-root {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 2147483647 !important;
  box-sizing: border-box !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  font-size: 16px !important;
}

/* =============================================
   COMAGRO EVENTOS — Design System Global CSS
   ============================================= */

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');

/* ---- Variables ---- */
:root {
  --primary:        #1f2f6b;
  --primary-hover:  #2d4299;
  --primary-light:  #eef1fb;
  --primary-dark:   #16225a;
  --surface:        #ffffff;
  --surface-2:      #f7f8fc;
  --surface-3:      #eef0f7;
  --border:         #e2e7f4;
  --border-light:   #f0f3fb;
  --text-1:         #1a1f36;
  --text-2:         #6f7b87;
  --text-3:         #9aa3b0;
  --success:        #16a34a;
  --success-bg:     #f0fdf4;
  --warning:        #d97706;
  --warning-bg:     #fffbeb;
  --danger:         #dc2626;
  --danger-bg:      #fef2f2;
  --info:           #2563eb;
  --info-bg:        #eff6ff;
  --radius-sm:      6px;
  --radius:         10px;
  --radius-lg:      16px;
  --radius-xl:      24px;
  --shadow-sm:      0 1px 3px rgba(31,47,107,.07);
  --shadow:         0 4px 16px rgba(31,47,107,.10);
  --shadow-lg:      0 8px 32px rgba(31,47,107,.14);
  --sidebar-w:      240px;
  --topbar-h:       60px;
  --transition:     .18s ease;
}

/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px !important; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--surface-2);
  color: var(--text-1);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* ---- Typography ---- */
h1, h2, h3, h4, h5 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text-1);
}
h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); }
h2 { font-size: clamp(1.3rem, 3vw, 1.7rem); }
h3 { font-size: 1.15rem; }
h4 { font-size: 1rem; font-weight: 600; }
p  { color: var(--text-2); line-height: 1.65; }

/* ---- Layout ---- */
.app-layout {
  display: flex;
  min-height: 100vh;
}
.app-main {
  flex: 1;
  margin-left: var(--sidebar-w);
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.page-content {
  flex: 1;
  padding: 28px 32px;
}

/* ---- Sidebar ---- */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--primary-dark);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow-y: auto;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 20px 20px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-logo img {
  height: 36px;
  width: auto;
  filter: brightness(0) invert(1);
}
.sidebar-logo-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: .78rem;
  color: rgba(255,255,255,.85);
  line-height: 1.3;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.sidebar-section {
  padding: 16px 12px 4px;
}
.sidebar-section-label {
  font-size: .68rem;
  font-weight: 600;
  color: rgba(255,255,255,.35);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 0 8px;
  margin-bottom: 4px;
}
.sidebar-nav { list-style: none; }
.sidebar-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: rgba(255,255,255,.70);
  font-size: .875rem;
  font-weight: 500;
  transition: background var(--transition), color var(--transition);
}
.sidebar-nav a:hover,
.sidebar-nav a.active {
  background: rgba(255,255,255,.10);
  color: #fff;
}
.sidebar-nav a.active {
  background: rgba(255,255,255,.15);
  color: #fff;
}
.sidebar-nav .nav-icon {
  width: 18px;
  text-align: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.sidebar-footer {
  margin-top: auto;
  padding: 14px 12px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.sidebar-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--primary-hover);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: .8rem;
  flex-shrink: 0;
}
.sidebar-user-info {
  flex: 1;
  min-width: 0;
}
.sidebar-user-name {
  font-size: .82rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-role {
  font-size: .7rem;
  color: rgba(255,255,255,.45);
  text-transform: capitalize;
}

/* ---- Topbar ---- */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-1);
  flex: 1;
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ---- Cards ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}
.card-sm { padding: 16px 20px; }
.card-hover {
  transition: box-shadow var(--transition), transform var(--transition);
  cursor: pointer;
}
.card-hover:hover {
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}

/* ---- Stat Cards ---- */
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition);
}
.stat-card:hover { box-shadow: var(--shadow); }
.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.stat-icon.blue   { background: var(--primary-light); color: var(--primary); }
.stat-icon.green  { background: var(--success-bg); color: var(--success); }
.stat-icon.yellow { background: var(--warning-bg); color: var(--warning); }
.stat-icon.red    { background: var(--danger-bg); color: var(--danger); }
.stat-body { flex: 1; min-width: 0; }
.stat-value {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 1.75rem;
  color: var(--text-1);
  line-height: 1;
}
.stat-label {
  font-size: .78rem;
  color: var(--text-2);
  margin-top: 4px;
  font-weight: 500;
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  height: 38px;
  padding: 0 18px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: .875rem;
  transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
  white-space: nowrap;
  text-decoration: none;
}
.btn:active { transform: scale(.98); }
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(31,47,107,.25); }
.btn-secondary {
  background: var(--surface);
  color: var(--text-1);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface-2); }
.btn-danger {
  background: var(--danger);
  color: #fff;
}
.btn-danger:hover { background: #b91c1c; }
.btn-success {
  background: var(--success);
  color: #fff;
}
.btn-success:hover { background: #15803d; }
.btn-ghost {
  background: transparent;
  color: var(--text-2);
  padding: 0 10px;
}
.btn-ghost:hover { background: var(--surface-3); color: var(--text-1); }
.btn-sm { height: 32px; padding: 0 12px; font-size: .8rem; }
.btn-lg { height: 46px; padding: 0 28px; font-size: 1rem; }
.btn-full { width: 100%; }
.btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }

/* ---- Form Elements ---- */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block;
  font-size: .82rem;
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 6px;
}
.form-label .req { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%;
  height: 40px;
  padding: 0 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-1);
  font-size: .9rem;
  transition: border-color var(--transition), box-shadow var(--transition);
  outline: none;
}
.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31,47,107,.10);
}
.form-control::placeholder { color: var(--text-3); }
textarea.form-control {
  height: auto;
  padding: 10px 12px;
  resize: vertical;
  min-height: 90px;
}
select.form-control { cursor: pointer; }
.form-hint {
  font-size: .75rem;
  color: var(--text-3);
  margin-top: 4px;
}
.form-error {
  font-size: .75rem;
  color: var(--danger);
  margin-top: 4px;
}
.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
}

/* ---- Badges ---- */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 9px;
  border-radius: 99px;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .02em;
  text-transform: capitalize;
}
.badge-blue   { background: var(--primary-light); color: var(--primary); }
.badge-green  { background: var(--success-bg); color: var(--success); }
.badge-yellow { background: var(--warning-bg); color: var(--warning); }
.badge-red    { background: var(--danger-bg); color: var(--danger); }
.badge-gray   { background: var(--surface-3); color: var(--text-2); }

/* ---- Tables ---- */
.table-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  background: var(--surface);
}
table {
  width: 100%;
  border-collapse: collapse;
}
thead th {
  background: var(--surface-2);
  padding: 11px 16px;
  text-align: left;
  font-size: .76rem;
  font-weight: 700;
  color: var(--text-2);
  letter-spacing: .04em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 12px 16px;
  font-size: .875rem;
  color: var(--text-1);
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface-2); }

/* ---- Search / Filter Bar ---- */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.search-input-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.search-input-wrap .search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  font-size: .9rem;
  pointer-events: none;
}
.search-input {
  width: 100%;
  height: 38px;
  padding: 0 12px 0 34px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-size: .875rem;
  color: var(--text-1);
  outline: none;
  transition: border-color var(--transition);
}
.search-input:focus { border-color: var(--primary); }

/* ---- Page Header ---- */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.page-header-left h1 { font-size: 1.4rem; }
.page-header-left p  { font-size: .85rem; margin-top: 2px; }

/* ---- Empty State ---- */
.empty-state {
  text-align: center;
  padding: 56px 24px;
}
.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  opacity: .35;
}
.empty-state h3 { color: var(--text-2); font-weight: 600; }
.empty-state p  { font-size: .85rem; margin-top: 6px; }

/* ---- Grids ---- */
.grid-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.grid-events {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

/* ---- Event Card ---- */
.event-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: box-shadow var(--transition), transform var(--transition);
  cursor: pointer;
}
.event-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.event-card-banner {
  height: 130px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
  position: relative;
  overflow: hidden;
}
.event-card-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.event-card-type {
  position: absolute;
  top: 10px;
  right: 10px;
}
.event-card-body { padding: 16px 18px 18px; }
.event-card-date {
  font-size: .75rem;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.event-card-name {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--text-1);
  margin-bottom: 6px;
  line-height: 1.3;
}
.event-card-location {
  font-size: .8rem;
  color: var(--text-2);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.event-card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border-light);
  padding-top: 12px;
}
.event-card-stat {
  font-size: .75rem;
  color: var(--text-2);
  font-weight: 500;
}
.event-card-stat strong {
  display: block;
  font-size: 1.05rem;
  color: var(--text-1);
  font-weight: 700;
}

/* ---- Toast Notifications ---- */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border-radius: var(--radius);
  background: var(--text-1);
  color: #fff;
  font-size: .875rem;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  min-width: 260px;
  transform: translateX(110%);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
}
.toast.toast-show { transform: translateX(0); }
.toast-success { background: #15803d; }
.toast-error   { background: var(--danger); }
.toast-info    { background: var(--primary); }
.toast-icon    { font-weight: 800; font-size: 1rem; flex-shrink: 0; }

/* ---- Modal ---- */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26,31,54,.45);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity .2s, visibility .2s;
}
.modal-backdrop.open { opacity: 1; visibility: visible; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(20px) scale(.97);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.modal-backdrop.open .modal { transform: translateY(0) scale(1); }
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 { font-size: 1.05rem; }
.modal-close {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: var(--surface-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  color: var(--text-2);
  transition: background var(--transition);
}
.modal-close:hover { background: var(--border); }
.modal-body   { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

/* ---- Progress Bar ---- */
.progress {
  height: 8px;
  background: var(--surface-3);
  border-radius: 99px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 99px;
  background: var(--primary);
  transition: width .6s ease;
}
.progress-bar.green  { background: var(--success); }
.progress-bar.yellow { background: var(--warning); }
.progress-bar.red    { background: var(--danger); }

/* ---- Loader ---- */
.loader {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.loader-page {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 300px;
}
.loader-page .loader {
  width: 32px;
  height: 32px;
  border-color: var(--border);
  border-top-color: var(--primary);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Breadcrumbs ---- */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .78rem;
  color: var(--text-3);
  margin-bottom: 16px;
}
.breadcrumb a { color: var(--text-2); }
.breadcrumb a:hover { color: var(--primary); }
.breadcrumb .sep { color: var(--text-3); }

/* ---- Dividers ---- */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* ---- Alert Inline ---- */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: .875rem;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.alert-success { background: var(--success-bg); color: var(--success); }
.alert-warning { background: var(--warning-bg); color: var(--warning); }
.alert-danger  { background: var(--danger-bg);  color: var(--danger); }
.alert-info    { background: var(--info-bg);    color: var(--info); }

/* ---- Mobile Sidebar Toggle ---- */
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px;
  color: var(--text-1);
  font-size: 1.2rem;
}

/* ========================
   RESPONSIVE
   ======================== */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }
  .app-main {
    margin-left: 0;
  }
  .sidebar-toggle { display: flex; }
  .page-content { padding: 20px 16px; }
  .topbar { padding: 0 16px; }
  .grid-stats { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .page-header { flex-direction: column; align-items: flex-start; }
}

@media (max-width: 420px) {
  .grid-stats { grid-template-columns: 1fr; }
  .stat-card { padding: 16px; }
}

/* ========================
   PRINT
   ======================== */
@media print {
  .sidebar, .topbar, .btn, .filter-bar { display: none !important; }

  <style>
    .checkin-header{background:var(--primary);color:#fff;padding:20px 28px;border-radius:var(--radius-lg);margin-bottom:22px;}
    .checkin-header h2{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.2rem;color:#fff;margin-bottom:4px;}
    .checkin-header p{font-size:.82rem;color:rgba(255,255,255,.7);margin:0;}
    .checkin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
    .checkin-stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center;}
    .checkin-stat .num{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;color:var(--primary);}
    .checkin-stat .lbl{font-size:.72rem;color:var(--text-2);font-weight:500;margin-top:2px;}
    .attendee-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border-light);transition:background .12s;}
    .attendee-row:last-child{border-bottom:none;}
    .attendee-row:hover{background:var(--surface-2);}
    .attendee-avatar{width:40px;height:40px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0;font-family:'Montserrat',sans-serif;}
    .attendee-info{flex:1;min-width:0;}
    .attendee-name{font-weight:600;font-size:.9rem;color:var(--text-1);}
    .attendee-sub{font-size:.75rem;color:var(--text-3);margin-top:2px;}
    .btn-present{height:36px;padding:0 16px;background:var(--success);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:700;font-size:.8rem;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;}
    .btn-present:hover{background:#15803d;}
    .btn-present:active{transform:scale(.96);}
    .btn-present:disabled{opacity:.5;cursor:not-allowed;}
    .present-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--success-bg);color:var(--success);border-radius:99px;font-size:.75rem;font-weight:700;}
    .present-time{font-size:.7rem;color:var(--text-3);margin-top:2px;}
    .search-bar{margin-bottom:16px;}
  </style>

<body>
<div class="comagro-app-root">
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="https://www.chacomer.com.py/media/wysiwyg/comagro/ISOLOGO_COMAGRO_COLOR.png" alt="Comagro">
      <div class="sidebar-logo-text">Comagro<br>Eventos</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">General</div>
      <ul class="sidebar-nav">
        <li><a href="/eventos-dashboard"><span class="nav-icon"><i data-lucide="bar-chart-3" size="18" stroke-width="2.5"></i></span> Dashboard</a></li>
        <li><a href="/eventos-lista"><span class="nav-icon"><i data-lucide="calendar" size="18" stroke-width="2.5"></i></span> Eventos</a></li>
        <li><a href="/eventos-crear"><span class="nav-icon"><i data-lucide="plus" size="18" stroke-width="2.5"></i></span> Crear Evento</a></li>
      </ul>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">Gestión</div>
      <ul class="sidebar-nav">
        <li><a href="/eventos-registrados"><span class="nav-icon"><i data-lucide="users" size="18" stroke-width="2.5"></i></span> Registrados</a></li>
        <li><a href="/eventos-checkin" class="active"><span class="nav-icon"><i data-lucide="check-circle" size="18" stroke-width="2.5"></i></span> Check-in</a></li>
        <li><a href="/eventos-reportes"><span class="nav-icon"><i data-lucide="trending-up" size="18" stroke-width="2.5"></i></span> Reportes</a></li>
      </ul>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="user-avatar">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Cargando...</div>
          <div class="sidebar-user-role" id="user-role">—</div>
        </div>
      </div>
      <button id="btn-logout" class="btn btn-ghost btn-full" style="margin-top:12px;color:rgba(255,255,255,.5);justify-content:flex-start;gap:8px;font-size:.8rem;"><i data-lucide="log-out" size="16" stroke-width="2.5"></i> Cerrar sesión</button>
    </div>
  </aside>

  <div class="app-main">
    <header class="topbar">
      <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
      <div class="topbar-title" id="topbar-title">Check-in</div>
    </header>

    <main class="page-content">
      <!-- Event selector -->
      <div class="card" style="margin-bottom:22px;" id="event-selector">
        <h3 style="margin-bottom:14px;">Seleccionar evento</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <select id="event-select" class="form-control" style="flex:1;min-width:220px;">
            <option value="">— Elegir evento —</option>
          </select>
          <button class="btn btn-primary" id="btn-load-event">Cargar Check-in</button>
        </div>
      </div>

      <!-- Check-in panel -->
      <div id="checkin-panel" style="display:none;">
        <div class="checkin-header">
          <h2 id="ci-event-name">Evento</h2>
          <p id="ci-event-meta">Fecha · Lugar</p>
        </div>

        <div class="checkin-stats">
          <div class="checkin-stat">
            <div class="num" id="ci-total">0</div>
            <div class="lbl">Registrados</div>
          </div>
          <div class="checkin-stat">
            <div class="num" id="ci-present" style="color:var(--success);">0</div>
            <div class="lbl">Presentes</div>
          </div>
          <div class="checkin-stat">
            <div class="num" id="ci-pct" style="color:var(--warning);">0%</div>
            <div class="lbl">Asistencia</div>
          </div>
        </div>

        <div class="card" style="padding:0;">
          <div style="padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="search-input-wrap" style="flex:1;margin:0;">
              <span class="search-icon"><i data-lucide="search" size="18" stroke-width="2.5"></i></span>
              <input type="text" id="ci-search" class="search-input" placeholder="Buscar por nombre, apellido, empresa o ID...">
            </div>
            <select id="ci-filter" class="form-control" style="width:auto;height:38px;">
              <option value="">Todos</option>
              <option value="pendiente">Pendientes</option>
              <option value="presente">Presentes</option>
            </select>
          </div>
          <div id="attendee-list">
            <div class="loader-page" style="min-height:200px;"><div class="loader" style="border-top-color:var(--primary);border-color:var(--border);"></div></div>
          </div>
        </div>

  </div>
</div>
<div id="toast-container"></div>

<script>
const SUPABASE_URL='https://itylpvuzflqlmmqvdhbz.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWxwdnV6ZmxxbG1tcXZkaGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjYzMTgsImV4cCI6MjA5MTg0MjMxOH0.yuZ5sWX-Isxd04ySP_ZgDLit1fQDsxoeb25GmU_C_5I';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{autoRefreshToken:true,persistSession:true}});

function sanitize(s){return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'})[c]);}
function formatDate(d){if(!d)return '—';return new Date(d+'T00:00:00').toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'numeric'});}
function formatDateTime(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'});}

function showToast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.innerHTML=`<span class="toast-icon">${type==='success'?'✓':'✕'}</span><span>${sanitize(msg)}</span>`;
  c.appendChild(t);
  setTimeout(()=>t.classList.add('toast-show'),10);
  setTimeout(()=>{t.classList.remove('toast-show');setTimeout(()=>t.remove(),400);},3000);
}

let allRegs=[], currentSession=null, currentEventId=null;

async function authGuard(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.replace('/eventos-login');return null;}
  const {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  return {session,profile:p};
}
function renderUser(p){
  if(!p)return;
  const name=p.full_name||p.email||'U';
  document.getElementById('user-name').textContent=name;
  document.getElementById('user-role').textContent=p.role||'staff';
  document.getElementById('user-avatar').textContent=name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

async function loadEventList(){
  const {data:events}=await sb.from('events').select('id,name,date,slug').order('date',{ascending:false});
  const sel=document.getElementById('event-select');
  (events||[]).forEach(e=>{
    const opt=document.createElement('option');
    opt.value=e.id;
    opt.textContent=`${e.name} (${formatDate(e.date)})`;
    sel.appendChild(opt);
  });
  // Auto-load from URL param
  const paramEvent=new URLSearchParams(window.location.search).get('event');
  if(paramEvent){sel.value=paramEvent;await loadCheckin(paramEvent);}
}

function renderList(){
  const q=document.getElementById('ci-search').value.toLowerCase();
  const f=document.getElementById('ci-filter').value;
  const filtered=allRegs.filter(r=>{
    const matchQ=!q||(r.first_name+' '+r.last_name).toLowerCase().includes(q)||
      (r.company||'').toLowerCase().includes(q)||
      (r.email||'').toLowerCase().includes(q)||
      (r.short_id||'').toLowerCase().includes(q);
    const matchF=!f||(f==='presente'&&r.status==='presente')||(f==='pendiente'&&r.status!=='presente');
    return matchQ&&matchF;
  });

  const total=allRegs.length;
  const present=allRegs.filter(r=>r.status==='presente').length;
  document.getElementById('ci-total').textContent=total;
  document.getElementById('ci-present').textContent=present;
  document.getElementById('ci-pct').textContent=(total>0?Math.round(present/total*100):0)+'%';

  const list=document.getElementById('attendee-list');
  if(filtered.length===0){
    list.innerHTML=`<div class="empty-state" style="padding:40px;"><div class="empty-state-icon"><i data-lucide="user" size="48" stroke-width="1.5"></i></div><h3>Sin resultados</h3></div>`;
    return;
  }
  list.innerHTML=filtered.map(r=>{
    const initials=(r.first_name[0]||'')+(r.last_name[0]||'');
    const isPresent=r.status==='presente';
    return `<div class="attendee-row" id="row-${r.id}">
      <div class="attendee-avatar">${sanitize(initials.toUpperCase())}</div>
      <div class="attendee-info">
        <div class="attendee-name">${sanitize(r.first_name+' '+r.last_name)}</div>
        <div class="attendee-sub">${sanitize(r.company||'—')} · ${sanitize(r.email)} · <strong>#${sanitize(r.short_id)}</strong></div>
        ${isPresent?`<div class="present-time">✓ Presente ${formatDateTime(r.attended_at)}</div>`:''}
      </div>
      <div>
        ${isPresent
          ? `<span class="present-badge"><i data-lucide="check-circle" size="18" stroke-width="2.5"></i> Presente</span>`
          : `<button class="btn-present" onclick="markPresent('${r.id}')">✓ PRESENTE</button>`
        }
      </div>
    </div>`;
  }).join('');
}

async function loadCheckin(eventId){
  currentEventId=eventId;
  const {data:ev}=await sb.from('events').select('*').eq('id',eventId).single();
  if(!ev)return;
  document.getElementById('topbar-title').textContent='Check-in — '+ev.name;
  document.getElementById('ci-event-name').textContent=ev.name;
  document.getElementById('ci-event-meta').textContent=`${formatDate(ev.date)} · ${ev.location||'Sin ubicación'}`;

  const {data:regs}=await sb.from('registrations').select('*').eq('event_id',eventId).order('last_name');
  allRegs=regs||[];
  document.getElementById('checkin-panel').style.display='block';
  renderList();
}

async function markPresent(regId){
  const btn=document.querySelector(`#row-${regId} .btn-present`);
  if(btn){btn.disabled=true;btn.textContent='...';}

  const now=new Date().toISOString();
  const {error}=await sb.from('registrations').update({
    status:'presente',
    attended_at:now,
    attended_by:currentSession?.user?.id||null
  }).eq('id',regId);

  if(error){showToast('Error al registrar asistencia.','error');if(btn){btn.disabled=false;btn.textContent='✓ PRESENTE';}return;}

  // Update local state
  const reg=allRegs.find(r=>r.id===regId);
  if(reg){reg.status='presente';reg.attended_at=now;}
  showToast('<i data-lucide="check-circle" size="18" stroke-width="2.5"></i> Asistencia registrada.');
  renderList();
}

document.getElementById('btn-load-event').addEventListener('click',()=>{
  const id=document.getElementById('event-select').value;
  if(!id)return;
  loadCheckin(id);
});
document.getElementById('ci-search').addEventListener('input',renderList);
document.getElementById('ci-filter').addEventListener('change',renderList);
document.getElementById('sidebar-toggle').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('btn-logout').addEventListener('click',async()=>{await sb.auth.signOut();window.location.replace('/eventos-login');});

(async()=>{
  const auth=await authGuard();
  if(!auth)return;
  currentSession=auth.session;
  renderUser(auth.profile);
  await loadEventList();
})();
</script>


<script>var _li = setInterval(function(){if(window.lucide){window.lucide.createIcons();clearInterval(_li);}}, 150);</script>
