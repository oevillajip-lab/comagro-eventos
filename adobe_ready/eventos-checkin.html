<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in — Comagro Eventos</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

/* ═══════════════════════════════════════════════
   COMAGRO EVENTOS v2 — Adobe Commerce Compatible
   Isolation wrapper forces its own stacking context
   ═══════════════════════════════════════════════ */

#ce-root {
  all: initial;
  display: block;
  font-family: 'Inter', system-ui, sans-serif !important;
  font-size: 15px !important;
  line-height: 1.5;
  color: #111827;
  background: #f4f6fb;
  position: fixed !important;
  inset: 0 !important;
  z-index: 99999 !important;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  box-sizing: border-box;
}

#ce-root *, #ce-root *::before, #ce-root *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

#ce-root a { color: inherit; text-decoration: none; }
#ce-root button, #ce-root input, #ce-root select, #ce-root textarea {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
}
#ce-root img { max-width: 100%; display: block; }
#ce-root h1, #ce-root h2, #ce-root h3, #ce-root h4, #ce-root h5, #ce-root h6 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  color: var(--c-ink1);
}

/* ── CSS Variables ── */
#ce-root {
  --c-bg:       #f4f6fb;
  --c-surface:  #ffffff;
  --c-surface2: #f8f9fc;
  --c-border:   #e5e9f2;
  --c-border2:  #eef1f8;

  --c-ink1:     #0c1221;
  --c-ink2:     #374151;
  --c-ink3:     #6b7280;
  --c-ink4:     #9ca3af;

  --c-blue:     #1d4ed8;
  --c-blue-lt:  #eff4ff;
  --c-blue-dk:  #1338a8;

  --c-green:    #059669;
  --c-green-lt: #ecfdf5;
  --c-amber:    #d97706;
  --c-amber-lt: #fffbeb;
  --c-red:      #dc2626;
  --c-red-lt:   #fef2f2;

  --sb-w:       256px;
  --top-h:      58px;

  --r1: 6px;
  --r2: 12px;
  --r3: 18px;
  --r4: 24px;

  --shadow1: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow2: 0 4px 20px rgba(0,0,0,.07), 0 1px 6px rgba(0,0,0,.04);
  --shadow3: 0 16px 48px rgba(0,0,0,.11), 0 4px 16px rgba(0,0,0,.05);
}

/* ═══ SHELL ═══ */
#ce-root .shell {
  display: flex;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* ═══ SIDEBAR ═══ */
#ce-root .sb {
  width: var(--sb-w);
  flex-shrink: 0;
  background: #0b1120;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 10;
  transition: transform .28s cubic-bezier(.4,0,.2,1), width .28s cubic-bezier(.4,0,.2,1);
  scrollbar-width: none;
}
#ce-root .sb::-webkit-scrollbar { display: none; }

/* Brand */
#ce-root .sb-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
#ce-root .sb-mark {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(29,78,216,.4);
}
#ce-root .sb-mark svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
#ce-root .sb-brand-text {}
#ce-root .sb-brand-name {
  font-size: 13px; font-weight: 800; color: #fff;
  letter-spacing: .01em; line-height: 1.2;
  font-family: 'Montserrat', sans-serif;
  text-transform: uppercase;
}
#ce-root .sb-brand-sub {
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,.32);
  letter-spacing: .06em; text-transform: uppercase;
  margin-top: 1px;
}

/* Nav */
#ce-root .sb-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 1px; }
#ce-root .sb-sect-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,255,255,.22); padding: 14px 8px 5px;
}
#ce-root .sb-a {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--r1);
  color: rgba(255,255,255,.52); font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: background .14s, color .14s;
  border: none; background: none; width: 100%; text-align: left;
  text-decoration: none;
}
#ce-root .sb-a:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.85); }
#ce-root .sb-a.active {
  background: rgba(29,78,216,.25);
  color: #93b4fd;
  font-weight: 600;
}
#ce-root .sb-a .sb-ic {
  width: 17px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: .8;
}
#ce-root .sb-a.active .sb-ic { opacity: 1; }
#ce-root .sb-a .sb-ic svg { width: 16px; height: 16px; }

/* Footer */
#ce-root .sb-foot {
  padding: 12px 10px; border-top: 1px solid rgba(255,255,255,.06); flex-shrink: 0;
}
#ce-root .sb-user {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--r1); cursor: pointer;
  transition: background .14s;
}
#ce-root .sb-user:hover { background: rgba(255,255,255,.06); }
#ce-root .sb-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px; flex-shrink: 0; letter-spacing: .01em;
}
#ce-root .sb-uname { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#ce-root .sb-urole { font-size: 10.5px; color: rgba(255,255,255,.32); text-transform: capitalize; margin-top: 1px; }
#ce-root .sb-logout {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--r1);
  color: rgba(255,255,255,.3); font-size: 12px;
  cursor: pointer; background: none; border: none; width: 100%; text-align: left;
  transition: color .14s, background .14s; margin-top: 4px;
}
#ce-root .sb-logout:hover { color: rgba(255,255,255,.6); background: rgba(255,255,255,.04); }
#ce-root .sb-logout svg { width: 14px; height: 14px; }

/* ═══ MAIN ═══ */
#ce-root .main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  height: 100%; overflow: hidden;
}

/* ═══ TOPBAR ═══ */
#ce-root .topbar {
  height: var(--top-h); flex-shrink: 0;
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
  z-index: 5;
}
#ce-root .tb-hamburger {
  width: 36px; height: 36px; border-radius: var(--r1);
  display: none; align-items: center; justify-content: center;
  background: none; border: 1px solid var(--c-border); cursor: pointer;
  color: var(--c-ink3); transition: background .14s;
}
#ce-root .tb-hamburger:hover { background: var(--c-surface2); }
#ce-root .tb-hamburger svg { width: 18px; height: 18px; }
#ce-root .tb-title {
  font-size: 15px; font-weight: 600; color: var(--c-ink1); flex: 1;
}
#ce-root .tb-title span { color: var(--c-ink4); font-weight: 400; margin-right: 6px; }
#ce-root .tb-right { display: flex; align-items: center; gap: 8px; }
#ce-root .tb-iBtn {
  width: 36px; height: 36px; border-radius: var(--r1);
  display: flex; align-items: center; justify-content: center;
  background: var(--c-surface); border: 1px solid var(--c-border);
  color: var(--c-ink3); cursor: pointer; transition: background .14s;
}
#ce-root .tb-iBtn:hover { background: var(--c-surface2); }
#ce-root .tb-iBtn svg { width: 16px; height: 16px; }

/* ═══ PAGE ═══ */
#ce-root .page {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 28px 30px 40px;
  scrollbar-width: thin;
  scrollbar-color: #d1d5db transparent;
}
#ce-root .page::-webkit-scrollbar { width: 5px; }
#ce-root .page::-webkit-scrollbar-track { background: transparent; }
#ce-root .page::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }

/* ═══ WELCOME STRIP ═══ */
#ce-root .welcome {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
}
#ce-root .welcome-left {}
#ce-root .welcome-tag {
  font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--c-blue); margin-bottom: 5px;
}
#ce-root .welcome-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 28px; font-weight: 700;
  color: var(--c-ink1); line-height: 1.1;
  letter-spacing: -.02em;
}
#ce-root .welcome-sub { font-size: 13px; color: var(--c-ink3); margin-top: 4px; font-weight: 400; }

/* ═══ STAT CARDS ═══ */
#ce-root .stats-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 14px; margin-bottom: 22px;
}
#ce-root .scard {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--r3); padding: 20px;
  display: flex; align-items: center; gap: 14px;
  transition: box-shadow .2s, transform .2s;
}
#ce-root .scard:hover { box-shadow: var(--shadow2); transform: translateY(-1px); }
#ce-root .scard-ic {
  width: 48px; height: 48px; border-radius: var(--r2);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#ce-root .scard-ic svg { width: 22px; height: 22px; }
#ce-root .scard-ic.blue { background: var(--c-blue-lt); color: var(--c-blue); }
#ce-root .scard-ic.green { background: var(--c-green-lt); color: var(--c-green); }
#ce-root .scard-ic.amber { background: var(--c-amber-lt); color: var(--c-amber); }
#ce-root .scard-ic.slate { background: #f1f5f9; color: #475569; }
#ce-root .scard-ic svg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
#ce-root .scard-val {
  font-family: 'Montserrat', sans-serif;
  font-size: 32px; font-weight: 700; color: var(--c-ink1);
  line-height: 1; letter-spacing: -.02em;
}
#ce-root .scard-lbl { font-size: 12px; color: var(--c-ink3); margin-top: 4px; font-weight: 500; }

/* ═══ GRID ═══ */
#ce-root .mid-grid {
  display: grid;
  grid-template-columns: 1fr 310px;
  gap: 18px; margin-bottom: 20px;
}
#ce-root .card {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--r3); overflow: hidden;
}
#ce-root .card-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px;
}
#ce-root .card-hd-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 700; color: var(--c-ink1);
}
#ce-root .card-hd-title svg { width: 15px; height: 15px; color: var(--c-ink4); stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
#ce-root .card-bd { padding: 0 20px 18px; }

/* Upcoming */
#ce-root .uitem {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; border-bottom: 1px solid var(--c-border2);
}
#ce-root .uitem:last-child { border-bottom: none; }
#ce-root .udbox {
  width: 44px; height: 44px; border-radius: var(--r2);
  background: var(--c-blue-lt); color: var(--c-blue);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 9.5px; font-weight: 700; letter-spacing: .03em;
  line-height: 1.1;
}
#ce-root .udbox .uday {
  font-family: 'Montserrat', sans-serif;
  font-size: 20px; font-weight: 700; line-height: 1; letter-spacing: -.01em;
}
#ce-root .uinfo { flex: 1; min-width: 0; }
#ce-root .uname { font-size: 13.5px; font-weight: 600; color: var(--c-ink1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#ce-root .umeta { font-size: 11.5px; color: var(--c-ink4); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
#ce-root .umeta svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
#ce-root .uprog { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
#ce-root .ubar { flex: 1; height: 4px; background: #e5e9f2; border-radius: 99px; overflow: hidden; }
#ce-root .ubar-fill { height: 100%; border-radius: 99px; background: var(--c-blue); transition: width .6s; }
#ce-root .uprog-txt { font-size: 11px; color: var(--c-ink4); white-space: nowrap; min-width: 44px; text-align: right; font-weight: 500; }

/* Chart */
#ce-root .chart-area { position: relative; display: flex; align-items: center; justify-content: center; padding: 12px 0 8px; height: 180px; }
#ce-root .chart-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -54%); text-align: center; pointer-events: none; }
#ce-root .chart-cn { font-family: 'Montserrat', sans-serif; font-size: 26px; color: var(--c-ink1); line-height: 1; font-weight: 700; }
#ce-root .chart-ct { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--c-ink4); margin-top: 2px; font-weight: 600; }
#ce-root .chart-legend { display: flex; flex-direction: column; gap: 7px; padding: 0 20px 16px; }
#ce-root .cl-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--c-ink2); }
#ce-root .cl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#ce-root .cl-bar-w { flex: 1; height: 4px; background: #e5e9f2; border-radius: 99px; overflow: hidden; }
#ce-root .cl-bar { height: 100%; border-radius: 99px; }
#ce-root .cl-val { font-weight: 700; color: var(--c-ink1); min-width: 18px; text-align: right; font-size: 12px; }

/* ═══ TABLE CARD ═══ */
#ce-root .tcard {}
#ce-root .tcard-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px; border-bottom: 1px solid var(--c-border2);
}
#ce-root .tcard-hd-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--c-ink1); }
#ce-root .tcard-hd-title svg { width: 15px; height: 15px; color: var(--c-ink4); stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
#ce-root .tbl-wrap { overflow-x: auto; }
#ce-root table { width: 100%; border-collapse: collapse; }
#ce-root thead th {
  padding: 9px 16px; text-align: left;
  font-size: 10.5px; font-weight: 700; color: var(--c-ink4);
  letter-spacing: .08em; text-transform: uppercase;
  background: var(--c-surface2); border-bottom: 1px solid var(--c-border);
  white-space: nowrap;
}
#ce-root tbody td {
  padding: 11px 16px; font-size: 13.5px; color: var(--c-ink1);
  border-bottom: 1px solid var(--c-border2); vertical-align: middle;
}
#ce-root tbody tr:last-child td { border-bottom: none; }
#ce-root tbody tr:hover { background: var(--c-surface2); }
#ce-root .td-name { font-weight: 600; }
#ce-root .td-date { color: var(--c-ink3); font-size: 12.5px; }
#ce-root .td-type { color: var(--c-ink2); }

/* ═══ BADGES ═══ */
#ce-root .badge {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 99px;
  font-size: 11px; font-weight: 700; letter-spacing: .02em;
}
#ce-root .badge-blue   { background: var(--c-blue-lt); color: var(--c-blue-dk); }
#ce-root .badge-green  { background: var(--c-green-lt); color: #064e3b; }
#ce-root .badge-gray   { background: #f1f5f9; color: #475569; }

/* ═══ BUTTONS ═══ */
#ce-root .btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 36px; padding: 0 16px; border-radius: var(--r1);
  border: none; cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  transition: all .15s; white-space: nowrap; text-decoration: none;
}
#ce-root .btn:active { transform: scale(.97); }
#ce-root .btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
#ce-root .btn-primary { background: var(--c-blue); color: #fff; }
#ce-root .btn-primary:hover { background: var(--c-blue-dk); }
#ce-root .btn-outline { background: var(--c-surface); color: var(--c-ink2); border: 1px solid var(--c-border); }
#ce-root .btn-outline:hover { background: var(--c-surface2); color: var(--c-ink1); }
#ce-root .btn-ghost { background: none; color: var(--c-ink3); padding: 0 10px; }
#ce-root .btn-ghost:hover { color: var(--c-blue); }
#ce-root .btn-sm { height: 30px; padding: 0 12px; font-size: 12px; }

/* Form Elements */
#ce-root .form-group { margin-bottom: 18px; }
#ce-root .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--c-ink1); margin-bottom: 6px; }
#ce-root .form-control {
  width: 100%; height: 42px; padding: 0 12px;
  border: 1.5px solid var(--c-border); border-radius: var(--r1);
  background: var(--c-surface); color: var(--c-ink1);
  font-size: 14px; transition: border-color .15s; outline: none;
}
#ce-root .form-control:focus { border-color: var(--c-blue); }
#ce-root textarea.form-control { height: auto; min-height: 90px; padding: 12px; resize: vertical; }

/* ═══ LOADER ═══ */
#ce-root .loader-wrap { display: flex; align-items: center; justify-content: center; padding: 60px 0; }
#ce-root .spin {
  width: 30px; height: 30px;
  border: 2.5px solid var(--c-border); border-top-color: var(--c-blue);
  border-radius: 50%; animation: ce-spin .65s linear infinite;
}
@keyframes ce-spin { to { transform: rotate(360deg); } }

/* ═══ EMPTY ═══ */
#ce-root .empty { text-align: center; padding: 36px 16px; }
#ce-root .empty p { font-size: 13px; color: var(--c-ink4); margin-top: 6px; }
#ce-root .empty h4 { font-size: 14px; color: var(--c-ink3); font-weight: 600; }

/* ═══ TOAST ═══ */
#ce-root .toast-stack {
  position: absolute; bottom: 22px; right: 22px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
#ce-root .toast {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; border-radius: var(--r2);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow3);
  min-width: 220px; max-width: 320px;
  transform: translateX(110%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  pointer-events: auto;
}
#ce-root .toast.show { transform: translateX(0); }
#ce-root .toast-ok  { background: #0b1120; color: #fff; }
#ce-root .toast-err { background: var(--c-red); color: #fff; }

/* ═══ MOBILE OVERLAY ═══ */
#ce-root .sb-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(11,17,32,.55); z-index: 9;
}
#ce-root .sb-overlay.vis { display: block; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1100px) {
  #ce-root .stats-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
  #ce-root .mid-grid { grid-template-columns: 1fr; }
}
@media (max-width: 860px) {
  #ce-root .sb { position: absolute; transform: translateX(-100%); }
  #ce-root .sb.open { transform: translateX(0); box-shadow: var(--shadow3); }
  #ce-root .tb-hamburger { display: flex !important; }
  #ce-root .page { padding: 20px 16px 32px; }
  #ce-root .topbar { padding: 0 16px; }
  #ce-root .welcome-title { font-size: 22px; }
}
@media (max-width: 520px) {
  #ce-root .stats-row { grid-template-columns: 1fr; }
}


</style>
  <style>
    #ce-root .checkin-header{background:var(--c-blue);color:#fff;padding:18px 20px;border-radius:var(--r2);margin-bottom:20px;}
    #ce-root .checkin-header .card-hd-title{font-family:'Montserrat',sans-serif;font-weight:700;font-size:15px;color:#fff;margin-bottom:4px;}
    #ce-root .checkin-header p{font-size:12px;color:rgba(255,255,255,.7);margin:0;}
    #ce-root .checkin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    #ce-root .checkin-stat{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r2);padding:14px 16px;text-align:center;}
    #ce-root .checkin-stat .num{font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.6rem;color:var(--c-blue);}
    #ce-root .checkin-stat .lbl{font-size:11px;color:var(--c-ink3);font-weight:500;margin-top:2px;}
    #ce-root .attendee-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--c-border2);transition:background .12s;}
    #ce-root .attendee-row:last-child{border-bottom:none;}
    #ce-root .attendee-row:hover{background:var(--c-surface2);}
    #ce-root .attendee-avatar{width:40px;height:40px;border-radius:50%;background:var(--c-blue-lt);color:var(--c-blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0;font-family:'Montserrat',sans-serif;}
    #ce-root .attendee-info{flex:1;min-width:0;}
    #ce-root .attendee-name{font-weight:600;font-size:13.5px;color:var(--c-ink1);}
    #ce-root .attendee-sub{font-size:11.5px;color:var(--c-ink4);margin-top:2px;}
    #ce-root .btn-present{height:36px;padding:0 16px;background:var(--c-green);color:#fff;border:none;border-radius:var(--r1);font-weight:700;font-size:12px;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;}
    #ce-root .btn-present:hover{background:#047857;}
    #ce-root .btn-present:active{transform:scale(.96);}
    #ce-root .btn-present:disabled{opacity:.5;cursor:not-allowed;}
    #ce-root .present-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--c-green-lt);color:var(--c-green);border-radius:99px;font-size:11.5px;font-weight:700;}
    #ce-root .present-time{font-size:11px;color:var(--c-ink4);margin-top:2px;}
    #ce-root .search-bar{margin-bottom:16px;}
    #ce-root .search-input-wrap{position:relative;flex:1;}
    #ce-root .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--c-ink4);display:flex;align-items:center;}
    #ce-root .search-input{width:100%;height:38px;padding:0 12px 0 36px;border:1.5px solid var(--c-border);border-radius:var(--r1);background:var(--c-surface);color:var(--c-ink1);font-size:13.5px;outline:none;transition:border-color .15s;}
    #ce-root .search-input:focus{border-color:var(--c-blue);}
  </style>
  <script>var _rjsDef = window.define; window.define = undefined;</script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<script>window.define = _rjsDef;</script>
</head>
<body>

<div id="ce-root">
  <div class="shell">
    <div class="sb-overlay" id="sb-ov"></div>
    <aside class="sb" id="sb">
      <div class="sb-brand">
        <div class="sb-mark">
          <svg viewBox="0 0 24 24"><path d="M12 3L4 7v10l8 4 8-4V7z"/><path d="M12 3v18M4 7l8 4 8-4"/></svg>
        </div>
        <div class="sb-brand-text">
          <div class="sb-brand-name">Comagro</div>
          <div class="sb-brand-sub">Plataforma de Eventos</div>
        </div>
      </div>
      <nav class="sb-nav">
        <div class="sb-sect-label">General</div>
        <a href="/eventos-dashboard" class="sb-a">
          <span class="sb-ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
          Dashboard
        </a>
        <a href="/eventos-lista" class="sb-a">
          <span class="sb-ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>
          Eventos
        </a>
        <a href="/eventos-crear" class="sb-a">
          <span class="sb-ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg></span>
          Crear Evento
        </a>
        <div class="sb-sect-label">Gestión</div>
        <a href="/eventos-registrados" class="sb-a">
          <span class="sb-ic"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          Registrados
        </a>
        <a href="/eventos-checkin" class="sb-a active">
          <span class="sb-ic"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span>
          Check-in
        </a>
        <a href="/eventos-reportes" class="sb-a">
          <span class="sb-ic"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></span>
          Reportes
        </a>
      </nav>
      <div class="sb-foot">
        <div class="sb-user">
          <div class="sb-avatar" id="sb-av">U</div>
          <div style="flex:1;min-width:0;">
            <div class="sb-uname" id="sb-uname">Cargando…</div>
            <div class="sb-urole" id="sb-urole">—</div>
          </div>
        </div>
        <button id="btn-logout" class="sb-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Cerrar sesión
        </button>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="tb-hamburger" id="sb-tog" aria-label="Menú">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="tb-title"><span>Comagro Eventos /</span> Check-in</div>
        <div class="tb-right">
          <button class="tb-iBtn" title="Notificaciones">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          </button>
        </div>
      </header>
      <div class="page" id="page">
        
      <!-- Event selector -->
      <div class="card" style="margin-bottom:22px;" id="event-selector">
        <h3 style="margin-bottom:14px;">Seleccionar evento</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <select id="event-select" class="form-control" style="flex:1;min-width:220px;">
            <option value="">— Elegir evento —</option>
          </select>
          <button class="btn btn-primary" id="btn-load-event">Cargar Check-in</button>
        </div>
      </div>

      <!-- Check-in panel -->
      <div id="checkin-panel" style="display:none;">
        <div class="checkin-header">
          <div class="card-hd-title" id="ci-event-name">Evento</div>
          <p id="ci-event-meta">Fecha · Lugar</p>
        </div>

        <div class="checkin-stats">
          <div class="checkin-stat">
            <div class="num" id="ci-total">0</div>
            <div class="lbl">Registrados</div>
          </div>
          <div class="checkin-stat">
            <div class="num" id="ci-present" style="color:var(--c-green);">0</div>
            <div class="lbl">Presentes</div>
          </div>
          <div class="checkin-stat">
            <div class="num" id="ci-pct" style="color:var(--c-amber);">0%</div>
            <div class="lbl">Asistencia</div>
          </div>
        </div>

        <div class="card" style="padding:0;">
          <div style="padding:16px 18px;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="search-input-wrap" style="flex:1;margin:0;">
              <span class="search-icon"><i data-lucide="search" size="18" stroke-width="2.5"></i></span>
              <input type="text" id="ci-search" class="search-input" placeholder="Buscar por nombre, apellido, empresa o ID...">
            </div>
            <select id="ci-filter" class="form-control" style="width:auto;height:38px;">
              <option value="">Todos</option>
              <option value="pendiente">Pendientes</option>
              <option value="presente">Presentes</option>
            </select>
          </div>
          <div id="attendee-list">
            <div class="loader-wrap" style="min-height:200px;"><div class="spin"></div></div>
          </div>
        </div>
      </div>
    
      </div>
    </div>
  </div>
  <div class="toast-stack" id="toasts"></div>
</div>


<script>
const SUPABASE_URL='https://itylpvuzflqlmmqvdhbz.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0eWxwdnV6ZmxxbG1tcXZkaGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjYzMTgsImV4cCI6MjA5MTg0MjMxOH0.yuZ5sWX-Isxd04ySP_ZgDLit1fQDsxoeb25GmU_C_5I';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{autoRefreshToken:true,persistSession:true}});

function sanitize(s){return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'})[c]);}
function formatDate(d){if(!d)return '—';return new Date(d+'T00:00:00').toLocaleDateString('es-PY',{day:'2-digit',month:'2-digit',year:'numeric'});}
function formatDateTime(iso){if(!iso)return '—';const d=new Date(iso);return d.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'});}

function showToast(msg,type='success'){
  const c=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className='toast '+(type==='success'?'toast-ok':'toast-err');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),350);},3500);
}

let allRegs=[], currentSession=null, currentEventId=null;

async function authGuard(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.replace('/eventos-login');return null;}
  const {data:p}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  return {session,profile:p};
}
function renderUser(p){
  if(!p)return;
  const name=p.full_name||p.email||'U';
  document.getElementById('sb-uname').textContent=name;
  document.getElementById('sb-urole').textContent=p.role||'staff';
  document.getElementById('sb-av').textContent=name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

async function loadEventList(){
  const {data:events}=await sb.from('events').select('id,name,date,slug').order('date',{ascending:false});
  const sel=document.getElementById('event-select');
  (events||[]).forEach(e=>{
    const opt=document.createElement('option');
    opt.value=e.id;
    opt.textContent=`${e.name} (${formatDate(e.date)})`;
    sel.appendChild(opt);
  });
  // Auto-load from URL param
  const paramEvent=new URLSearchParams(window.location.search).get('event');
  if(paramEvent){sel.value=paramEvent;await loadCheckin(paramEvent);}
}

function renderList(){
  const q=document.getElementById('ci-search').value.toLowerCase();
  const f=document.getElementById('ci-filter').value;
  const filtered=allRegs.filter(r=>{
    const matchQ=!q||(r.first_name+' '+r.last_name).toLowerCase().includes(q)||
      (r.company||'').toLowerCase().includes(q)||
      (r.email||'').toLowerCase().includes(q)||
      (r.short_id||'').toLowerCase().includes(q);
    const matchF=!f||(f==='presente'&&r.status==='presente')||(f==='pendiente'&&r.status!=='presente');
    return matchQ&&matchF;
  });

  const total=allRegs.length;
  const present=allRegs.filter(r=>r.status==='presente').length;
  document.getElementById('ci-total').textContent=total;
  document.getElementById('ci-present').textContent=present;
  document.getElementById('ci-pct').textContent=(total>0?Math.round(present/total*100):0)+'%';

  const list=document.getElementById('attendee-list');
  if(filtered.length===0){
    list.innerHTML=`<div class="empty" style="padding:40px;"><h4>Sin resultados</h4><p>No hay registrados que coincidan con la búsqueda.</p></div>`;
    return;
  }
  list.innerHTML=filtered.map(r=>{
    const initials=(r.first_name[0]||'')+(r.last_name[0]||'');
    const isPresent=r.status==='presente';
    return `<div class="attendee-row" id="row-${r.id}">
      <div class="attendee-avatar">${sanitize(initials.toUpperCase())}</div>
      <div class="attendee-info">
        <div class="attendee-name">${sanitize(r.first_name+' '+r.last_name)}</div>
        <div class="attendee-sub">${sanitize(r.company||'—')} · ${sanitize(r.email)} · <strong>#${sanitize(r.short_id)}</strong></div>
        ${isPresent?`<div class="present-time">✓ Presente ${formatDateTime(r.attended_at)}</div>`:''}
      </div>
      <div>
        ${isPresent
          ? `<span class="present-badge"><i data-lucide="check-circle" size="18" stroke-width="2.5"></i> Presente</span>`
          : `<button class="btn-present" onclick="markPresent('${r.id}')">✓ PRESENTE</button>`
        }
      </div>
    </div>`;
  }).join('');
}

async function loadCheckin(eventId){
  currentEventId=eventId;
  const {data:ev}=await sb.from('events').select('*').eq('id',eventId).single();
  if(!ev)return;
  document.getElementById('ci-event-name').textContent=ev.name;
  document.getElementById('ci-event-meta').textContent=`${formatDate(ev.date)} · ${ev.location||'Sin ubicación'}`;

  const {data:regs}=await sb.from('registrations').select('*').eq('event_id',eventId).order('last_name');
  allRegs=regs||[];
  document.getElementById('checkin-panel').style.display='block';
  renderList();
}

async function markPresent(regId){
  const btn=document.querySelector(`#row-${regId} .btn-present`);
  if(btn){btn.disabled=true;btn.textContent='...';}

  const now=new Date().toISOString();
  const {error}=await sb.from('registrations').update({
    status:'presente',
    attended_at:now,
    attended_by:currentSession?.user?.id||null
  }).eq('id',regId);

  if(error){showToast('Error al registrar asistencia.','error');if(btn){btn.disabled=false;btn.textContent='✓ PRESENTE';}return;}

  // Update local state
  const reg=allRegs.find(r=>r.id===regId);
  if(reg){reg.status='presente';reg.attended_at=now;}
  showToast('Asistencia registrada correctamente.');
  renderList();
}

document.getElementById('btn-load-event').addEventListener('click',()=>{
  const id=document.getElementById('event-select').value;
  if(!id)return;
  loadCheckin(id);
});
document.getElementById('ci-search').addEventListener('input',renderList);
document.getElementById('ci-filter').addEventListener('change',renderList);
document.getElementById('sb-tog').addEventListener('click',()=>document.getElementById('sb').classList.toggle('open'));
document.getElementById('btn-logout').addEventListener('click',async()=>{await sb.auth.signOut();window.location.replace('/eventos-login');});

(async()=>{
  const auth=await authGuard();
  if(!auth)return;
  currentSession=auth.session;
  renderUser(auth.profile);
  await loadEventList();
})();
</script>


<script>var _li = setInterval(function(){if(window.lucide){window.lucide.createIcons();clearInterval(_li);}}, 150);</script>
</body>
</html>
