<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
.page-wrapper,
.page-main,
.columns,
.column.main,
.cms-page-view .page-main,
.cms-page-view .columns,
.cms-page-view .column.main {
  background: #ffffff !important;
  max-width: 100% !important;
  width: 100% !important;
  padding: 0 !important;
  margin: 0 !important;
}

.page-main {
  min-height: auto !important;
}

#login-comagro{
  width:100vw;
  max-width:100vw;
  margin-left:calc(50% - 50vw);
  margin-right:calc(50% - 50vw);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  box-sizing:border-box;
  background:#fff;
  font-family: Arial, Helvetica, sans-serif;
}

#login-comagro .box{
  width:100%;
  max-width:980px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:80px;
}

#login-comagro .left{
  width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

#login-comagro .left h2{
  margin:0 0 12px;
  font-size:38px;
  line-height:1.1;
  color:#1f2f6b;
  font-weight:700;
}

#login-comagro .left p{
  margin:0 0 20px;
  font-size:16px;
  color:#6f7b87;
}

#login-comagro .left img{
  width:180px;
  display:block;
  margin:20px auto 0;
}

#login-comagro .right{
  width:340px;
  border:1px solid #ddd;
  padding:24px;
  box-sizing:border-box;
  background:#fff;
}

#login-comagro .right h3{
  margin:0 0 18px;
  font-size:24px;
  line-height:1.1;
  color:#1f2f6b;
  font-weight:700;
  text-align:center;
}

#login-comagro .right p{
  margin:0 0 16px;
  font-size:14px;
  color:#6f7b87;
  text-align:center;
  line-height:1.5;
}

#login-comagro input{
  width:100%;
  height:42px;
  margin-bottom:10px;
  padding:0 12px;
  border:1px solid #d9dee6;
  box-sizing:border-box;
  font-size:14px;
}

#login-comagro button{
  width:100%;
  height:42px;
  margin-top:8px;
  border:none;
  cursor:pointer;
  box-sizing:border-box;
  font-weight:700;
  font-size:14px;
}

#login-comagro .btn-main{
  background:#1f2f6b;
  color:#fff;
}

#login-comagro .status{
  margin-top:12px;
  color:red;
  min-height:18px;
  font-size:14px;
  text-align:center;
}

#login-comagro .note{
  margin-top:12px;
  font-size:12px;
  color:#8a94a3;
  text-align:center;
  line-height:1.5;
}

@media (max-width: 900px){
  #login-comagro .box{
    flex-direction:column;
    gap:36px;
  }

  #login-comagro .left,
  #login-comagro .right{
    width:100%;
    max-width:420px;
  }
}
</style>

<div id="login-comagro">
  <div class="box">

    <div class="left">
      <h2>Catálogos digitales - Fichas técnicas</h2>
      <p>Ingresá con tu correo corporativo para recibir un enlace de acceso.</p>
      <img src="https://www.chacomer.com.py/media/wysiwyg/comagro/ISOLOGO_COMAGRO_COLOR.png" alt="Comagro">
    </div>

    <div class="right">
      <h3>Acceso</h3>
      <p>Escribí tu correo <strong>@comagro.com.py</strong> y te enviaremos un enlace para ingresar.</p>

      <form id="form">
        <input type="email" id="email" placeholder="correo@comagro.com.py" autocomplete="email">
        <button type="submit" class="btn-main" id="submitBtn">Enviar enlace de acceso</button>
      </form>

      <div class="status" id="status"></div>
      <div class="note">En este dispositivo, una vez que ingreses, la sesión quedará guardada.</div>
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function () {
  const supabase = window.supabase.createClient(
    'https://itylpvuzflqlmmqvdhbz.supabase.co',
    'sb_publishable_7ZT8qNtk0oNRs2_8fmhyzA_gLzdVDNc'
  );

  const email = document.getElementById("email");
  const status = document.getElementById("status");
  const submitBtn = document.getElementById("submitBtn");
  const form = document.getElementById("form");

  function validarCorreo(c){
    return /^[a-zA-Z0-9._%+-]+@comagro\.com\.py$/i.test(c);
  }

  async function revisarSesion(){
    const { data } = await supabase.auth.getSession();

    if (data && data.session) {
      window.location.replace("documentaciones_comagro");
      return true;
    }

    return false;
  }

  // Si ya está logueado, entra directo
  const yaLogueado = await revisarSesion();
  if (yaLogueado) return;

  form.onsubmit = async function (e){
    e.preventDefault();

    const correo = email.value.trim().toLowerCase();

    if (!correo){
      status.style.color = "red";
      status.innerText = "Ingresá tu correo corporativo.";
      return;
    }

    if (!validarCorreo(correo)){
      status.style.color = "red";
      status.innerText = "Solo se permiten correos @comagro.com.py";
      return;
    }

    submitBtn.disabled = true;
    status.style.color = "#1f2f6b";
    status.innerText = "Enviando enlace...";

    const { error } = await supabase.auth.signInWithOtp({
      email: correo,
      options: {
        emailRedirectTo: window.location.origin + "/login"
      }
    });

    if (error){
      submitBtn.disabled = false;
      status.style.color = "red";
      status.innerText = "No fue posible enviar el enlace.";
      return;
    }

    submitBtn.disabled = false;
    status.style.color = "green";
    status.innerText = "Revisá tu correo corporativo y abrí el enlace de acceso.";
  };
});
</script>
